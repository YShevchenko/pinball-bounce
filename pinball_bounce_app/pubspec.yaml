name: pinball_bounce
description: "Pinball Bounce - Neon arcade pinball with procedural tables"
publish_to: 'none'
version: 1.0.10+10

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  shared_preferences: ^2.3.3
  in_app_purchase: ^3.2.1
  google_fonts: ^6.2.1
  audioplayers: ^6.1.0
  intl: any
  equatable: ^2.0.7


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.4

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
    - assets/data/
    - assets/icon/
    - assets/audio/
    - assets/icon/
    - assets/audio/sfx/

flutter_native_splash:
  color: "#2563EB"
  android: true
  ios: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  remove_alpha_ios: true
  min_sdk_android: 21
